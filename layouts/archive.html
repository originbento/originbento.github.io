{{ define "main" }}
<section>
  <article>
	  <h2>アーカイブ</h2>
    {{ range (where .Site.RegularPages "Type" "posts").GroupByDate "2006-01" }}
    <h2>{{ .Key }}</h2>
    <ul>
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time>{{ .Date.Format "2006-01-02" }}</time>
      </li>
    {{ end }}
  </ul>
  {{ end }}
  </article>
  </section>
  {{ end }}
