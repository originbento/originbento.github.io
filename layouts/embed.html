{{ $url := .Get 0 }}
{{ $api := printf "https://api.microlink.io/?url=%s" $url }}

{{ with getJSON $api }}
  {{ with .data }}
    <a href="{{ $url }}" class="embed-card">
      {{ with .image }}
        <img src="{{ .url }}">
      {{ end }}
      <strong>{{ .title }}</strong>
      <p>{{ .description }}</p>
    </a>
  {{ end }}
{{ else }}
  <a href="{{ $url }}">{{ $url }}</a>
{{ end }}
